services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rectella
      POSTGRES_PASSWORD: rectella
      POSTGRES_DB: rectella
    network_mode: host
    command: postgres -c listen_addresses=localhost
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rectella"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
